{% extends "base.html" %}


{% block banner_content %}

<a href="{{ url_for('home') }}">

    <img

        src="{{ url_for('static', filename='images/edit_book.png') }}"

        style="
            width:350px;
            height:auto;
        ">

</a>

{% endblock %}


{% block content %}

<form method="POST" enctype="multipart/form-data">

    <div class="row justify-content-center">

        <!-- αριστερη στηλη -->

        <div
            class="col-md-3"
            style="margin-top:35px;">

            <!-- isbn -->

            <label class="form-label">

                ISBN

            </label>

            <div class="d-flex mb-3">

                <input

                    type="text"

                    id="isbn"

                    name="isbn"

                    value="{{ book.isbn }}"

                    class="form-control"

                    onkeydown="
                        if(event.key === 'Enter'){
                            event.preventDefault();
                            lookupISBN();
                        }
                    ">

                <button

                    type="button"

                    class="btn btn-outline-secondary ms-2"

                    onclick="lookupISBN()">

                    <img

                        src="{{ url_for('static', filename='images/search.png') }}"

                        style="
                            width:22px;
                            height:22px;
                        ">

                </button>

            </div>

            <!-- τιτλος -->

            <label class="form-label">

                Τίτλος

            </label>

            <input

                type="text"

                id="title"

                name="title"

                value="{{ book.title }}"

                class="form-control mb-3"

                required>

            <!-- συγγραφεας -->

            <label class="form-label">

                Συγγραφέας

            </label>

            <input

                type="text"

                id="authors"

                name="authors"

                value="{{ book.authors }}"

                class="form-control mb-3">

            <!-- εκδοτης -->

            <label class="form-label">

                Εκδότης

            </label>

            <input

                type="text"

                id="publisher"

                name="publisher"

                value="{{ book.publisher }}"

                class="form-control mb-3">

            <!-- γλωσσα και εξωφυλλο -->

            <div class="row">

                <div class="col">

                    <label class="form-label">

                        Γλώσσα

                    </label>

                    <input

                        type="text"

                        id="language"

                        name="language"

                        value="{{ book.language }}"

                        class="form-control">

                </div>

                <div class="col">

                    <label class="form-label">

                        Εξώφυλλο

                    </label>

                    <input

                        type="text"

                        id="cover_type"

                        name="cover_type"

                        value="{{ book.cover_type }}"

                        class="form-control">

                </div>

            </div>

            <br>

            <!-- ετος σελιδες αντιτυπα -->

            <div class="row">

                <div class="col">

                    <label class="form-label">

                        Έτος

                    </label>

                    <input

                        type="number"

                        id="year"

                        name="year"

                        value="{{ book.year }}"

                        class="form-control">

                </div>

                <div class="col">

                    <label class="form-label">

                        Σελίδες

                    </label>

                    <input

                        type="number"

                        id="pages"

                        name="pages"

                        value="{{ book.pages }}"

                        class="form-control">

                </div>

                <div class="col">

                    <label class="form-label">

                        Αντίτυπα

                    </label>

                    <input

                        type="number"

                        name="copies"

                        value="{{ book.copies }}"

                        class="form-control">

                </div>

            </div>

            <br>

            <!-- κατηγοριες -->

            <label class="form-label">

                Κατηγορίες

            </label>

            <select

                id="categories"

                name="categories"

                multiple>

                <option value="Fantasy">Fantasy</option>
                <option value="Adventure">Adventure</option>
                <option value="Sci-fi">Sci-fi</option>
                <option value="Mystery">Mystery</option>
                <option value="Thriller">Thriller</option>
                <option value="Romance">Romance</option>
                <option value="Horror">Horror</option>
                <option value="Historical Fiction">Historical Fiction</option>
                <option value="History">History</option>
                <option value="Biography">Biography</option>
                <option value="Autobiography">Autobiography</option>
                <option value="Poetry">Poetry</option>
                <option value="Psychology">Psychology</option>
                <option value="Philosophy">Philosophy</option>
                <option value="Business">Business</option>
                <option value="Politics">Politics</option>
                <option value="Religion">Religion</option>
                <option value="Science">Science</option>
                <option value="Technology">Technology</option>
                <option value="Programming">Programming</option>
                <option value="Children">Children</option>
                <option value="Young Adult">Young Adult</option>
                <option value="Comics">Comics</option>

            </select>

        </div>

        <!-- μεσαια στηλη -->

        <div class="col-md-3">

            <label

                class="form-label"

                style="
                    display:block;
                    text-align:center;
                    font-size:18px;
                    margin-top:30px;
                    margin-bottom:10px;
                ">

                Περίληψη

            </label>

            <textarea

                id="description"

                name="description"

                class="form-control"

                style="height:600px;">{{ book.description }}

            </textarea>

        </div>

        <!-- δεξια στηλη -->

        <div class="col-md-3 text-center">

            <div

                id="cover_container"

                style="
                    width:450px;
                    height:635px;
                    border:1px solid #dee2e6;
                    border-radius:0.375rem;
                    margin:auto;
                    margin-top:34px;
                    display:flex;
                    align-items:center;
                    justify-content:center;
                ">

                <img

                    id="cover"

                    src="{{ book.cover_url }}"

                    style="
                        width:100%;
                        height:100%;
                        object-fit:contain;
                        display:block;
                    ">

                <span

                    id="cover_placeholder"

                    style="display:none;">

                    Cover Art

                    <br><br>

                    <label

                        for="cover_upload"

                        class="btn btn-outline-secondary">

                        Επιλογή εικόνας

                    </label>

                </span>

            </div>

            <input

                type="hidden"

                id="cover_url"

                name="cover_url"

                value="{{ book.cover_url }}">

            <input

                type="file"

                id="cover_upload"

                name="cover_upload"

                accept="image/*"

                style="display:none;">

            <!-- αποθηκευση -->

            <button

                type="submit"

                class="btn btn-success btn-lg mt-3"

                style="width:250px;">

                Αποθήκευση

            </button>

        </div>

    </div>

</form>


<!-- isbn lookup -->

<script src="{{ url_for('static', filename='js/isbn_lookup.js') }}"></script>


<!-- tomselect για τις κατηγοριες -->

<script>

document.addEventListener(
    "DOMContentLoaded",
    function () {

        const tom = new TomSelect(
            "#categories",
            {

                plugins: [
                    "remove_button"
                ],

                create: false,

                maxItems: null,

                hideSelected: true,

                closeAfterSelect: false,

                placeholder:
                    "Επιλογή κατηγοριών..."

            }

        );

        // φορτωση υπαρχουσων κατηγοριων

        const categories =
            "{{ book.categories or '' }}"
            .split(",");

        categories.forEach(
            category => {

                if (
                    category.trim() !== ""
                ) {

                    tom.addItem(
                        category.trim()
                    );

                }

            }

        );

    }
);

</script>


<!-- εμφανιση υπαρχοντος εξωφυλλου -->

<script>

document.addEventListener(
    "DOMContentLoaded",
    function () {

        const cover =
            document.getElementById(
                "cover"
            );

        const placeholder =
            document.getElementById(
                "cover_placeholder"
            );

        const container =
            document.getElementById(
                "cover_container"
            );

        if (
            cover.src &&
            !cover.src.endsWith("/")
        ) {

            cover.style.display =
                "block";

            placeholder.style.display =
                "none";

            container.style.border =
                "none";

        }

        else {

            cover.style.display =
                "none";

            placeholder.style.display =
                "block";

            container.style.border =
                "1px solid #dee2e6";

        }

    }
);

</script>


<!-- εμφανιση νεου εξωφυλλου -->

<script>

document
    .getElementById(
        "cover_upload"
    )
    .addEventListener(
        "change",
        function(event) {

            const file =
                event.target.files[0];

            if (!file) return;

            const reader =
                new FileReader();

            reader.onload =
                function(e) {

                    document
                        .getElementById(
                            "cover"
                        ).src =
                        e.target.result;

                    document
                        .getElementById(
                            "cover"
                        ).style.display =
                        "block";

                    document
                        .getElementById(
                            "cover_placeholder"
                        ).style.display =
                        "none";

                    document
                        .getElementById(
                            "cover_container"
                        ).style.border =
                        "none";

                };

            reader.readAsDataURL(
                file
            );

        }

    );

</script>

{% endblock %}
