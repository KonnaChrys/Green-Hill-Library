<!DOCTYPE html>
<html lang="el">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Library System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <!-- header -->

    <div style="
        background-image:url('/static/images/banner.png');
        background-size:cover;
        background-position:center;
        padding:65px;
        position:relative;
    ">

        <!-- εικονα banner -->

        <div style="
            position:absolute;
            left:50px;
            top:50%;
            transform:translateY(-50%);
            color:white;
        ">

            {% block banner_content %}
            {% endblock %}

        </div>

        <div class="d-flex justify-content-center align-items-center">

            <!-- αναζητηση -->

            <form

                method="GET"

                action="/books"

                class="search-form">

                <input

                    type="text"

                    name="search"

                    class="form-control search-input"

                    placeholder="Αναζήτηση..."

                    value="{{ request.args.get('search', '') }}">

                <button

                    type="submit"

                    class="search-button">

                    <img

                        src="{{ url_for('static', filename='images/search.png') }}"

                        class="search-icon">

                </button>

            </form>

            <!-- φιλτρα -->

            <button

                type="button"

                class="header-button"

                onclick="toggleFilters()"

                style="
                    margin-left:10px;
                    width:38px;
                    height:38px;
                    border-radius:6px;
                ">

                <img

                    src="{{ url_for('static', filename='images/filter.png') }}"

                    style="
                        width:22px;
                        height:22px;
                    ">

            </button>

            <!-- προσθηκη βιβλιου -->

            <a

                href="/add-book"

                class="header-button"

                style="
                    margin-left:10px;
                    width:38px;
                    height:38px;
                    border-radius:6px;
                    display:flex;
                    align-items:center;
                    justify-content:center;
                ">

                <img

                    src="{{ url_for('static', filename='images/add.png') }}"

                    style="
                        width:22px;
                        height:22px;
                    ">

            </a>

        </div>

    </div>

    <!-- παραθυρο φιλτρων -->

    <form

        method="GET"

        action="/books"

        id="filterPanel">

        <!-- κατηγοριες -->

        <label class="form-label">

            Κατηγορίες

        </label>

        <select

            id="filter_categories"

            name="categories"

            multiple>

            <option>Fantasy</option>
            <option>Adventure</option>
            <option>Sci-fi</option>
            <option>Mystery</option>
            <option>Thriller</option>
            <option>Romance</option>
            <option>Horror</option>
            <option>Historical Fiction</option>
            <option>History</option>
            <option>Biography</option>
            <option>Autobiography</option>
            <option>Poetry</option>
            <option>Psychology</option>
            <option>Philosophy</option>
            <option>Business</option>
            <option>Politics</option>
            <option>Religion</option>
            <option>Science</option>
            <option>Technology</option>
            <option>Programming</option>
            <option>Children</option>
            <option>Young Adult</option>
            <option>Comics</option>

        </select>

        <br>

        <!-- γλωσσα -->

        <label>

            Γλώσσα

        </label>

        <select

            class="form-control"

            name="language">

            <option
                value="Όλες"
                {% if request.args.get('language', 'Όλες') == 'Όλες' %}selected{% endif %}>

                Όλες

            </option>

            <option
                value="Ελληνικά"
                {% if request.args.get('language') == 'Ελληνικά' %}selected{% endif %}>

                Ελληνικά

            </option>

            <option
                value="Αγγλικά"
                {% if request.args.get('language') == 'Αγγλικά' %}selected{% endif %}>

                Αγγλικά

            </option>

            <option
                value="Γαλλικά"
                {% if request.args.get('language') == 'Γαλλικά' %}selected{% endif %}>

                Γαλλικά

            </option>

            <option
                value="Γερμανικά"
                {% if request.args.get('language') == 'Γερμανικά' %}selected{% endif %}>

                Γερμανικά

            </option>

        </select>

        <br>

        <!-- ετος -->

        <label>

            Έτος

        </label>

        <select

            class="form-control"

            name="year">

            <option>Όλα</option>
            <option>Πριν το 1950</option>
            <option>1950-1979</option>
            <option>1980-1999</option>
            <option>2000-2009</option>
            <option>2010-2019</option>
            <option>2020+</option>

        </select>

        <br>

        <!-- σελιδες -->

        <label>

            Σελίδες

        </label>

        <select

            class="form-control"

            name="pages">

            <option>Όλες</option>
            <option>1-100</option>
            <option>101-200</option>
            <option>201-300</option>
            <option>301-400</option>
            <option>401-500</option>
            <option>500+</option>

        </select>

        <br>

        <!-- διαθεσιμοτητα -->

        <div class="form-check">

            <input

                class="form-check-input"

                type="checkbox"

                id="available_only"

                name="available_only"

                value="1"

                {% if request.args.get('available_only') %}checked{% endif %}>

            <label

                class="form-check-label"

                for="available_only">

                Μόνο διαθέσιμα βιβλία

            </label>

        </div>

        <br>

        <!-- κουμπια φιλτρων -->

        <div class="d-flex justify-content-end">

            <button

                type="button"

                class="btn library-btn-red me-2"

                onclick="window.location='/books';">

                Καθαρισμός

            </button>

            <button

                type="submit"

                class="btn library-btn-green">

                Εφαρμογή

            </button>

        </div>

    </form>

    <!-- περιεχομενο σελιδας -->

    <div class="container-fluid mt-3">

        {% block content %}
        {% endblock %}

    </div>


    <!-- scripts -->

    <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


    <!-- ανοιγμα και κλεισιμο φιλτρων -->

    <script>

        function toggleFilters() {

            const panel =
                document.getElementById(
                    "filterPanel"
                );

            if (
                panel.style.display ==
                "block"
            )

                panel.style.display =
                    "none";

            else

                panel.style.display =
                    "block";

        }

    </script>


    <!-- tomselect για τις κατηγοριες -->

    <script>

        document.addEventListener(
            "DOMContentLoaded",
            function () {

                new TomSelect(
                    "#filter_categories",
                    {

                        plugins: [
                            "remove_button"
                        ],

                        create: false,

                        maxItems: null,

                        hideSelected: false,

                        closeAfterSelect: false,

                        placeholder:
                            "Επιλογή κατηγοριών..."

                    }

                );

            }

        );

    </script>

</body>

</html>
