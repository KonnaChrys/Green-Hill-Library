<!DOCTYPE html>
<html lang="el">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Library System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">

</head>

<body>

    <!-- HEADER -->

    <div style="
        background-image:url('/static/images/banner.png');
        background-size:cover;
        background-position:center;
        padding:70px;
        position:relative;
    ">

        <!-- ΚΕΙΜΕΝΟ ΑΡΙΣΤΕΡΑ -->

        <div style="
            position:absolute;
            left:50px;
            top:50%;
            transform:translateY(-50%);
            color:white;
        ">

            {% block banner_content %}
            {% endblock %}

        </div>

        <div class="d-flex justify-content-center align-items-center">

            <!-- Search -->

            <form method="GET" action="/books" style="
                position:relative;
                width:850px;
            ">

                <input type="text" name="search" class="form-control" placeholder="Αναζήτηση..."
                    value="{{ request.args.get('search', '') }}" style="
                    padding-right:45px;
                ">

                <button type="submit" style="
                    position:absolute;
                    top:50%;
                    right:10px;
                    transform:translateY(-50%);
                    border:none;
                    background:none;
                ">

                    <img src="{{ url_for('static', filename='images/search.png') }}" style="
                        width:22px;
                        height:22px;
                    ">

                </button>

            </form>

            <!-- Filters -->

            <button style="
                margin-left:10px;
                width:38px;
                height:38px;
                background:white;
                border:1px solid #d0d0d0;
                border-radius:6px;
            ">

                <img src="{{ url_for('static', filename='images/filter.png') }}" style="
                    width:22px;
                    height:22px;
                ">

            </button>

            <!-- Add -->

            <a href="/add-book" style="
                margin-left:10px;
                width:38px;
                height:38px;
                background:white;
                border:1px solid #d0d0d0;
                border-radius:6px;
                display:flex;
                align-items:center;
                justify-content:center;
            ">

                <img src="{{ url_for('static', filename='images/add.png') }}" style="
                    width:22px;
                    height:22px;
                ">

            </a>

        </div>

    </div>

    <div class="container-fluid mt-3">

        {% block content %}
        {% endblock %}

    </div>

    <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
