{% extends "base.html" %}

{% block content %}

<h1>Προσθήκη Βιβλίου</h1>

<form method="POST">

    <div class="mb-3">

        <label class="form-label">
            ISBN
        </label>

        <input
            type="text"
            id="isbn"
            name="isbn"
            class="form-control">

    </div>

    <button type="button" class="btn btn-success mt-2" onclick="lookupISBN()">
      Αναζήτηση ISBN
    </button>

    <div class="mt-3">

        <img
            id="cover"
            src=""
            class="img-thumbnail mt-3"
            style="max-width:200px; display:none;">

        <input
            type="hidden"
            id="cover_url"
            name="cover_url">

    </div>

    <div class="mb-3">

        <label class="form-label">
            Τίτλος
        </label>

        <input
            type="text"
            id="title"
            name="title"
            class="form-control"
            required>

    </div>

    <div class="mb-3">

      <label class="form-label">
          Συγγραφέας
      </label>

      <input
        type="text"
        id="authors"
        name="authors"
        class="form-control">

    </div>

    <div class="mb-3">

        <label class="form-label">
            Εκδότης
        </label>

        <input
            type="text"
            id="publisher"
            name="publisher"
            class="form-control">

    </div>

    <div class="mb-3">

        <label class="form-label">
            Έτος
        </label>

        <input
            type="number"
            id="year"
            name="year"
            class="form-control">

    </div>

    <div class="mb-3">

        <label class="form-label">
            Σελίδες
        </label>

        <input
            type="number"
            name="pages"
            class="form-control">

    </div>

    <div class="mb-3">

        <label class="form-label">
            Γλώσσα
        </label>

        <input
            type="text"
            name="language"
            class="form-control">

    </div>

    <div class="mb-3">

        <label class="form-label">
            Αντίτυπα
        </label>

        <input
            type="number"
            name="copies"
            value="1"
            class="form-control">

    </div>

    <button
        type="submit"
        class="btn btn-primary">

        Αποθήκευση

    </button>

</form>

<script src="{{ url_for('static', filename='js/isbn_lookup.js') }}"></script>

{% endblock %}
