{% extends "base.html" %}

{% block content %}

<div class="d-flex align-items-center mb-4">

    <!-- Logo -->

    <a href="/books">

        <img

            src="{{ url_for('static', filename='images/logo.png') }}"

            style="
                width:300px;
                height:auto;
            ">

    </a>

    <!-- Τίτλος -->

    <h1
        class="mb-0"
        style="
            margin-left:50px;
            margin-right:50px;
        ">

        Βιβλία

    </h1>

    <!-- Search -->

    <form
        method="GET"
        action="/books"
        class="d-flex">

        <input

            type="text"

            name="search"

            class="form-control"

            placeholder="Αναζήτηση βιβλίου..."

            value="{{ request.args.get('search', '') }}"

            style="
                width:760px;
            ">

        <button

            type="submit"

            style="
                margin-left:10px;
                width:38px;
                height:38px;
                background:white;
                border:1px solid #d0d0d0;
                border-radius:6px;
            ">

        <img

            src="{{ url_for('static', filename='images/search.png') }}"

            style="
                width:22px;
                height:22px;
            ">

        </button>

    </form>

    <!-- Φίλτρα -->

    <button

        style="
            margin-left:10px;
            width:38px;
            height:38px;
            background:white;
            border:1px solid #d0d0d0;
            border-radius:6px;
        ">

        <img

            src="{{ url_for('static', filename='images/filter.png') }}"

            style="
                width:22px;
                height:22px;
            ">

    </button>

</div>

<div class="container">
    
    <div class="row">

        {% for book in books %}

        <div class="col-6 col-sm-4 col-md-3 col-lg-2 mb-5">

            <a
                href="/book/{{ book.id }}"
                class="text-decoration-none text-dark">

                <div>

                    <img

                        src="{{ book.cover_url }}"

                        class="img-fluid"

                        style="
                            height:300px;
                            width:100%;
                            object-fit:contain;
                        "

                        onerror="this.src='https://placehold.co/300x450?text=No+Cover'">

                    <div class="mt-3">

                        <h5
                            style="
                                font-size:1.1rem;
                                margin-bottom:5px;
                            ">

                            {{ book.title }}

                        </h5>

                        <p
                            style="
                                margin-bottom:5px;
                                color:#555;
                            ">

                            {{ book.authors }}

                        </p>

                        <p
                            style="
                                color:#777;
                                margin-bottom:0;
                            ">

                            Αντίτυπα:
                            {{ book.copies }}/{{ book.copies }}

                        </p>

                    </div>

                </div>

            </a>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
