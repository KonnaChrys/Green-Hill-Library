{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-5">

    <div class="d-flex align-items-center">

        <div
            class="border rounded d-flex align-items-center justify-content-center me-4"
            style="
                width:70px;
                height:70px;
                background-color:#f8f9fa;
            ">

            LOGO

        </div>

        <h1 class="me-4 mb-0">

            Βιβλία

        </h1>

        <input
            type="text"
            class="form-control"
            placeholder="Αναζήτηση βιβλίου..."
            style="width:350px;">

    </div>

    <button class="btn btn-outline-secondary">

        Φίλτρα

    </button>

</div>

<div class="row">

    {% for book in books %}

    <div class="col-6 col-sm-4 col-md-3 col-lg-2 mb-5">

        <a
            href="/book/{{ book.id }}"
            class="text-decoration-none text-dark">

            <div>

                <img

                    src="{{ book.cover_url }}"

                    class="img-fluid"

                    style="
                        height:300px;
                        width:100%;
                        object-fit:contain;
                    "

                    onerror="this.src='https://placehold.co/300x450?text=No+Cover'">

                <div class="mt-3">

                    <h5
                        style="
                            font-size:1.1rem;
                            margin-bottom:5px;
                        ">

                        {{ book.title }}

                    </h5>

                    <p
                        style="
                            margin-bottom:5px;
                            color:#555;
                        ">

                        {{ book.authors }}

                    </p>

                    <p
                        style="
                            color:#777;
                            margin-bottom:0;
                        ">

                        Αντίτυπα:
                        {{ book.copies }}/{{ book.copies }}

                    </p>

                </div>

            </div>

        </a>

    </div>

    {% endfor %}

</div>

{% endblock %}
