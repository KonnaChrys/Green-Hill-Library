{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <div class="d-flex align-items-center">

        <div
            class="border rounded d-flex align-items-center justify-content-center me-3"
            style="
                width:70px;
                height:70px;
                background-color:#f8f9fa;
            ">

            LOGO

        </div>

        <h2 class="me-4 mb-0">

            Βιβλία

        </h2>

        <div style="width:350px;">

            <input
                type="text"
                class="form-control"
                placeholder="Αναζήτηση βιβλίου...">

        </div>

    </div>

    <button
        class="btn btn-outline-secondary">

        Φίλτρα

    </button>

</div>

<div class="row">

    {% for book in books %}

    <div class="col-lg-3 col-md-4 col-sm-6 mb-4">

        <div class="card h-100 shadow-sm">

            <img
                src="{{ book.cover_url }}"
                class="card-img-top"
                style="
                    height:300px;
                    object-fit:cover;
                "
                onerror="this.src='https://placehold.co/300x450?text=No+Cover'">

            <div class="card-body">

                <h5 class="card-title">

                    {{ book.title }}

                </h5>

                <p class="card-text">

                    {{ book.authors }}

                </p>

                <p class="card-text">

                    {{ book.copies }}/{{ book.copies }}

                </p>

            </div>

        </div>

    </div>

    {% endfor %}

</div>


{% endblock %}
