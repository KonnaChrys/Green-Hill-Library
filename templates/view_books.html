{% extends "base.html" %}


{% block banner_content %}

<a href="{{ url_for('home') }}">

    <img

        src="{{ url_for('static', filename='images/books.png') }}"

        style="
            width:350px;
            height:auto;
        ">

</a>

{% endblock %}


{% block content %}

<div class="container">

    <div class="row">

        {% for book in books %}

        <div class="col-6 col-sm-4 col-md-3 col-lg-2 mb-5">

            <a

                href="/book/{{ book.id }}"

                class="text-decoration-none text-dark">

                <div>

                    <!-- εξωφυλλο -->

                    <img

                        src="{{ book.cover_url }}"

                        class="img-fluid"

                        style="
                            height:300px;
                            width:100%;
                            object-fit:contain;
                        "

                        onerror="
                            this.src='https://placehold.co/300x450?text=No+Cover'
                        ">

                    <div class="mt-3">

                        <!-- τιτλος -->

                        <h5

                            style="
                                font-size:1.1rem;
                                margin-bottom:5px;
                            ">

                            {{ book.title }}

                        </h5>

                        <!-- συγγραφεας -->

                        <p

                            style="
                                margin-bottom:5px;
                                color:#555;
                            ">

                            {{ book.authors }}

                        </p>

                        <!-- διαθεσιμα αντιτυπα -->

                        <p

                            style="
                                color:#777;
                                margin-bottom:0;
                            ">

                            Αντίτυπα:
                            {{ book.copies }}/{{ book.total_copies }}

                        </p>

                    </div>

                </div>

            </a>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
